<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Details</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="login-container large-container">
        <div class="login-card">
            <div class="logo-placeholder">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                    <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                </svg>
            </div>
            <h2>Patient Information</h2>
            <p class="subtitle">Please provide your personal details and medical history.</p>

            <form id="detailsForm">
                <div class="form-grid">
                    <!-- Personal Details -->
                    <div class="form-section">
                        <h3>Personal Details</h3>
                        <div class="input-group">
                            <label for="dob">Date of Birth</label>
                            <input type="date" id="dob" required>
                        </div>
                        <div class="input-group">
                            <label for="gender">Gender</label>
                            <select id="gender" required>
                                <option value="" disabled selected>Select gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                                <option value="prefer-not">Prefer not to say</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" placeholder="Enter your phone number" required>
                        </div>
                        <div class="input-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" placeholder="Enter your email address">
                        </div>
                        <div class="input-group full-width">
                            <label for="address">Address</label>
                            <textarea id="address" placeholder="Enter your full address" rows="2"></textarea>
                        </div>
                    </div>

                    <!-- Medical History -->
                    <div class="form-section">
                        <h3>Medical History</h3>
                        <div class="input-group full-width">
                            <label for="allergies">Allergies</label>
                            <textarea id="allergies" placeholder="List any known allergies (e.g., Peanuts, Penicillin)"
                                rows="2"></textarea>
                        </div>
                        <div class="input-group full-width">
                            <label for="medications">Current Medications</label>
                            <textarea id="medications" placeholder="List any medications you are currently taking"
                                rows="2"></textarea>
                        </div>
                        <div class="input-group full-width">
                            <label for="conditions">Past Medical Conditions</label>
                            <textarea id="conditions" placeholder="List past medical conditions, surgeries, etc."
                                rows="2"></textarea>
                        </div>
                        <div class="input-group full-width">
                            <label for="familyHistory">Family Medical History</label>
                            <textarea id="familyHistory" placeholder="List major illnesses in your immediate family"
                                rows="2"></textarea>
                        </div>
                    </div>
                </div>

                <button type="submit" class="login-btn submit-btn">Save Information</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('detailsForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const btn = document.querySelector('.submit-btn');
            const originalText = btn.textContent;
            btn.textContent = 'Saving...';
            btn.style.opacity = '0.8';
            setTimeout(() => {
                btn.textContent = 'Information Saved Successfully!';
                btn.style.backgroundColor = '#10b981';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.backgroundColor = '';
                    btn.style.opacity = '1';
                }, 3000);
            }, 1000);
        });
    </script>
</body>

</html>
