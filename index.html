<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal Login</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <div class="login-container">
        <div class="login-card">
            <div class="top-bar">
                <div class="language-dropdown">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"

                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <path
                            d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z">
                        </path>
                    </svg>
                    <select id="language" aria-label="Select Language">
                        <option value="en">English</option>
                        <option value="hi">हिंदी (Hindi)</option>
                        <option value="bn">বাংলা (Bengali)</option>
                        <option value="te">తెలుగు (Telugu)</option>
                        <option value="mr">मराठी (Marathi)</option>
                        <option value="ta">தமிழ் (Tamil)</option>
                        <option value="ur">اردو (Urdu)</option>
                        <option value="gu">ગુજરાતી (Gujarati)</option>
                        <option value="kn">ಕನ್ನಡ (Kannada)</option>
                        <option value="or">ଓଡ଼ିଆ (Odia)</option>
                        <option value="ml">മലയാളം (Malayalam)</option>
                        <option value="pa">ਪੰਜਾਬੀ (Punjabi)</option>
                        <option value="as">অসমীয়া (Assamese)</option>
                    </select>
                </div>
            </div>
            <div class="logo-placeholder">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                </svg>
            </div>
            <h2 data-i18n="heading">Patient Portal</h2>
            <p class="subtitle" data-i18n="subtitle">Please enter your details to access your medical records.</p>

            <form id="loginForm">
                <div class="input-group">
                    <label for="patientName" data-i18n="nameLabel">Patient Name</label>
                    <input type="text" id="patientName" data-i18n-placeholder="namePlaceholder"
                        placeholder="Enter your full name" required>
                </div>

                <div class="input-group">
                    <label for="patientId" data-i18n="idLabel">Patient ID or Password</label>
                    <input type="password" id="patientId" data-i18n-placeholder="idPlaceholder"
                        placeholder="Enter your ID or password" required>
                </div>

                <div class="options">
                    <label class="remember-me">
                        <input type="checkbox"> <span data-i18n="rememberMe">Remember me</span>
                    </label>
                    <a href="#" class="forgot-password" data-i18n="needHelp">Need help?</a>
                </div>

                <button type="submit" class="login-btn" data-i18n="loginBtn">Log In to Portal</button>
            </form>
        </div>
    </div>

        let currentLang = 'en';

        document.getElementById('language').addEventListener('change', function (e) {
            currentLang = e.target.value;
            const t = translations[currentLang];

            // Adjust text direction for Urdu
            if (currentLang === 'ur') {
                document.querySelector('.login-card').setAttribute('dir', 'rtl');
            } else {
                document.querySelector('.login-card').setAttribute('dir', 'ltr');
            }

            // Update text contents
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.textContent = t[key];
            });

            // Update placeholders
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (t[key]) el.setAttribute('placeholder', t[key]);
            });

            document.title = t.heading + " - Log In";
        });

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const btn = document.querySelector('.login-btn');
            const t = translations[currentLang];

            btn.textContent = t.loggingIn;
            btn.style.opacity = '0.8';
            btn.style.pointerEvents = 'none';

            setTimeout(() => {
                btn.textContent = t.success;
                btn.style.backgroundColor = '#10b981';
                setTimeout(() => {
                    window.location.href = 'details.html';
                }, 1000);
            }, 1500);
        });

</html>
